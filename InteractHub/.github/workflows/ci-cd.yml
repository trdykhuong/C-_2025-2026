name: InteractHub CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  BACKEND_PATH: './backend/InteractHub.API'
  TESTS_PATH: './backend/InteractHub.Tests'
  FRONTEND_PATH: './frontend'

jobs:
  # ─── BACKEND BUILD & TEST ──────────────────────────────────────────────────
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        # Restore TESTS_PATH bao gồm cả API (do ProjectReference) lẫn các package riêng của test (xunit, Moq, coverlet)
        run: dotnet restore ${{ env.TESTS_PATH }}

      - name: Build API
        run: dotnet build ${{ env.BACKEND_PATH }} --no-restore --configuration Release

      - name: Build Tests
        run: dotnet build ${{ env.TESTS_PATH }} --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test ${{ env.TESTS_PATH }} \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./coverage

      - name: Publish backend
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet publish ${{ env.BACKEND_PATH }} \
            --configuration Release \
            --output ./publish/backend

      - name: Upload backend artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ./publish/backend

  # ─── FRONTEND BUILD ────────────────────────────────────────────────────────
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: TypeScript check
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npx tsc --noEmit

      - name: Build
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.AZURE_BACKEND_URL }}

      - name: Upload frontend artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_PATH }}/dist

  # ─── DEPLOY TO AZURE (main branch only) ───────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.AZURE_BACKEND_URL }}

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./publish/frontend

      - name: Deploy Backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./publish/backend

      - name: Deploy Frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./publish/frontend
          skip_app_build: true
